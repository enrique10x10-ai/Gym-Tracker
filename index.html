<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;


// ─── Palette ──────────────────────────────────────────────────────────────────
const C = {
  bg:"#0a0a0f", surface:"#12121a", card:"#1a1a26", border:"#2a2a40",
  accent:"#ff4d6d", accentGlow:"rgba(255,77,109,0.25)",
  gold:"#ffd166", cyan:"#06d6a0", purple:"#7c3aed", orange:"#ff9f1c",
  text:"#f0f0ff", muted:"#8888aa",
};

const MUSCLE_GROUPS = [
  "Chest","Back","Shoulders","Biceps","Triceps",
  "Forearms","Core / Abs","Quads","Hamstrings","Glutes","Calves","Full Body",
];

// Exercises that are dumbbell-based → show "per dumbbell" label
const DB_KEYWORDS = ["dumbbell","db ","d.b.","dumbell"];
const isDumbbell = (name) => DB_KEYWORDS.some(k => name.toLowerCase().includes(k));

const DEFAULT_EXERCISES = {
  Chest:["Bench Press","Incline Bench Press","Decline Bench Press","Push-Ups","Cable Fly","Dumbbell Fly","Chest Dip"],
  Back:["Deadlift","Pull-Up","Bent-Over Row","Lat Pulldown","Seated Row","T-Bar Row","Face Pull"],
  Shoulders:["Overhead Press","Lateral Raise","Front Raise","Arnold Press","Upright Row","Rear Delt Fly"],
  Biceps:["Barbell Curl","Dumbbell Curl","Hammer Curl","Preacher Curl","Cable Curl","Concentration Curl"],
  Triceps:["Tricep Pushdown","Skull Crushers","Close-Grip Bench","Overhead Extension","Dips","Kickback"],
  Forearms:["Wrist Curl","Reverse Curl","Farmer's Walk","Plate Pinch"],
  "Core / Abs":["Crunch","Plank","Leg Raise","Russian Twist","Ab Rollout","Cable Crunch","Hanging Knee Raise"],
  Quads:["Squat","Leg Press","Hack Squat","Leg Extension","Bulgarian Split Squat","Lunge"],
  Hamstrings:["Romanian Deadlift","Leg Curl","Nordic Curl","Stiff-Leg Deadlift","Good Morning"],
  Glutes:["Hip Thrust","Glute Bridge","Cable Kickback","Sumo Deadlift","Step-Up"],
  Calves:["Standing Calf Raise","Seated Calf Raise","Donkey Calf Raise","Box Jump"],
  "Full Body":["Clean and Press","Burpee","Kettlebell Swing","Thruster","Man-Maker"],
};

const TABS = ["Log","History","Tools","Body Weight","AI Coach"];

// ─── Storage ──────────────────────────────────────────────────────────────────
const useStorage = (key, init) => {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
    catch { return init; }
  });
  const save = useCallback((v) => {
    setVal(v); try { localStorage.setItem(key, JSON.stringify(v)); } catch {}
  }, [key]);
  return [val, save];
};

// ─── Shared UI ────────────────────────────────────────────────────────────────
const Tag = ({ children, color=C.accent }) => (
  <span style={{ background:`${color}22`, color, border:`1px solid ${color}44`,
    borderRadius:6, padding:"2px 8px", fontSize:10, fontWeight:700, letterSpacing:1, textTransform:"uppercase" }}>
    {children}
  </span>
);

const Btn = ({ children, onClick, variant="primary", style={}, disabled }) => {
  const base = { cursor:disabled?"not-allowed":"pointer", border:"none", borderRadius:10,
    fontFamily:"inherit", fontWeight:700, fontSize:13, transition:"all .15s",
    padding:"11px 18px", opacity:disabled ? .45 : 1, WebkitTapHighlightColor:"transparent" };
  const V = {
    primary:{ background:C.accent, color:"#fff", boxShadow:`0 0 18px ${C.accentGlow}` },
    ghost:{ background:"transparent", color:C.muted, border:`1px solid ${C.border}` },
    gold:{ background:C.gold, color:"#1a1000", boxShadow:`0 0 18px rgba(255,209,102,.3)` },
    cyan:{ background:C.cyan, color:"#001a12", boxShadow:`0 0 18px rgba(6,214,160,.3)` },
    orange:{ background:C.orange, color:"#1a0800" },
    danger:{ background:"#ff3055", color:"#fff" },
    subtle:{ background:C.surface, color:C.muted, border:`1px solid ${C.border}` },
  };
  return (
    <button onClick={onClick} disabled={disabled} style={{ ...base, ...V[variant], ...style }}
      onMouseEnter={e=>{ if(!disabled) e.currentTarget.style.filter="brightness(1.12)"; }}
      onMouseLeave={e=>{ e.currentTarget.style.filter=""; }}>
      {children}
    </button>
  );
};

// Auto-focusing input — focuses itself on mount when autoFocus=true
const Input = ({ value, onChange, placeholder, type="text", style={}, onKeyDown, autoFocus, inputRef, label, sublabel }) => {
  const ref = inputRef || useRef();
  useEffect(() => { if (autoFocus && ref.current) { ref.current.focus(); ref.current.select?.(); } }, [autoFocus]);
  return (
    <div style={{ width:"100%", ...style?.wrapper }}>
      {label && <div style={{ fontSize:10, color:C.gold, fontWeight:700, letterSpacing:1.5, marginBottom:5, textTransform:"uppercase" }}>{label}</div>}
      <input ref={ref} type={type} value={value}
        onChange={e => onChange(e.target.value)} placeholder={placeholder}
        onKeyDown={onKeyDown} inputMode={type==="number" ? "decimal" : undefined}
        style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10,
          color:C.text, padding:"12px 14px", fontSize:16, fontFamily:"inherit",
          outline:"none", width:"100%", boxSizing:"border-box", WebkitAppearance:"none", ...style }}
        onFocus={e=>{ e.target.style.borderColor=C.accent; e.target.style.boxShadow=`0 0 0 2px ${C.accentGlow}`; }}
        onBlur={e=>{ e.target.style.borderColor=C.border; e.target.style.boxShadow="none"; }}
      />
      {sublabel && <div style={{ fontSize:10, color:C.cyan, fontWeight:700, marginTop:4, letterSpacing:.5 }}>{sublabel}</div>}
    </div>
  );
};

const Select = ({ value, onChange, children, style={}, disabled }) => (
  <select value={value} onChange={e=>onChange(e.target.value)} disabled={disabled}
    style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10,
      color: value ? C.text : C.muted, padding:"12px 14px", fontSize:15, fontFamily:"inherit",
      outline:"none", width:"100%", boxSizing:"border-box",
      opacity:disabled ? .45 : 1, WebkitAppearance:"none", ...style }}>
    {children}
  </select>
);

const Card = ({ children, style={} }) => (
  <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:16, padding:16, ...style }}>
    {children}
  </div>
);

const SL = ({ children }) => (
  <div style={{ color:C.muted, fontSize:10, fontWeight:700, letterSpacing:2, marginBottom:8, textTransform:"uppercase" }}>
    {children}
  </div>
);

const Divider = ({ label }) => (
  <div style={{ display:"flex", alignItems:"center", gap:10, margin:"14px 0" }}>
    <div style={{ flex:1, height:1, background:C.border }}/>
    {label && <span style={{ fontSize:10, color:C.muted, fontWeight:700, letterSpacing:1.5 }}>{label}</span>}
    <div style={{ flex:1, height:1, background:C.border }}/>
  </div>
);

// ─── PR helpers ───────────────────────────────────────────────────────────────
const getPR = (prs, ex) => { const p=prs[ex]; if(!p) return null; return typeof p==="object" ? p : {weight:p,date:null}; };
const setPR = (prs, ex, weight, date) => {
  const cur = getPR(prs, ex);
  if (!cur || weight > cur.weight) return { ...prs, [ex]:{weight, date} };
  return prs;
};

// ─── REST TIMER ───────────────────────────────────────────────────────────────
const RestTimer = () => {
  const [secs, setSecs] = useState(0);
  const [running, setRunning] = useState(false);
  const [preset, setPreset] = useState(90);
  const ref = useRef();
  useEffect(() => {
    if (running && secs > 0) { ref.current = setTimeout(() => setSecs(s=>s-1), 1000); }
    else if (secs===0 && running) setRunning(false);
    return () => clearTimeout(ref.current);
  }, [running, secs]);
  const pct = preset > 0 ? (secs/preset)*100 : 0;
  const PRESETS = [10,30,60,90,120,180];
  return (
    <Card>
      <SL>⏱ Rest Timer</SL>
      <div style={{ display:"flex", alignItems:"center", gap:16 }}>
        <div style={{ position:"relative", width:80, height:80, flexShrink:0 }}>
          <svg width="80" height="80" style={{ transform:"rotate(-90deg)" }}>
            <circle cx="40" cy="40" r="34" fill="none" stroke={C.border} strokeWidth="5"/>
            <circle cx="40" cy="40" r="34" fill="none" stroke={running?C.cyan:C.muted}
              strokeWidth="5" strokeDasharray={`${2*Math.PI*34}`}
              strokeDashoffset={`${2*Math.PI*34*(1-pct/100)}`} style={{transition:"stroke-dashoffset .5s"}}/>
          </svg>
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center",
            fontSize:17, fontWeight:900, color:running?C.cyan:C.text }}>
            {String(Math.floor(secs/60)).padStart(2,"0")}:{String(secs%60).padStart(2,"0")}
          </div>
        </div>
        <div style={{ flex:1 }}>
          <div style={{ display:"flex", flexWrap:"wrap", gap:5, marginBottom:10 }}>
            {PRESETS.map(s=>(
              <button key={s} onClick={()=>{setPreset(s);setSecs(s);setRunning(false);}}
                style={{ background:preset===s?C.cyan:C.surface, color:preset===s?"#001":C.muted,
                  border:`1px solid ${C.border}`, borderRadius:7, padding:"4px 8px", fontSize:11,
                  cursor:"pointer", fontWeight:700, WebkitTapHighlightColor:"transparent" }}>
                {s}s
              </button>
            ))}
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <Btn onClick={()=>{setSecs(preset);setRunning(true);}} variant="cyan" style={{flex:1,padding:"9px"}}>
              {running?"Restart":"Start"}
            </Btn>
            <Btn onClick={()=>{setRunning(false);setSecs(preset);}} variant="ghost" style={{padding:"9px 12px"}}>Reset</Btn>
          </div>
        </div>
      </div>
    </Card>
  );
};

// ─── CONSISTENCY TRACKER ─────────────────────────────────────────────────────
const ConsistencyTracker = ({ workouts }) => {
  const [paused, setPaused] = useStorage("gym_streak_paused", false);
  const [pauseNote, setPauseNote] = useStorage("gym_streak_pause_note", "");
  const [showPause, setShowPause] = useState(false);
  const [noteInput, setNoteInput] = useState("");

  const getWeekKey = d => {
    const dt = new Date(d+"T12:00:00"), day=dt.getDay()||7;
    const mon = new Date(dt); mon.setDate(dt.getDate()-day+1);
    return mon.toISOString().split("T")[0];
  };
  const weekMap = {};
  workouts.forEach(w => { const k=getWeekKey(w.date); if(!weekMap[k]) weekMap[k]=new Set(); weekMap[k].add(w.date); });
  const qualWeeks = Object.values(weekMap).filter(d=>d.size>=3).length;
  const streak = (() => {
    if (paused||!workouts.length) return null;
    const qw = Object.entries(weekMap).filter(([,d])=>d.size>=3).map(([k])=>k).sort().reverse();
    if (!qw.length) return 0;
    let s=1;
    for (let i=1;i<qw.length;i++) { if (Math.round((new Date(qw[i-1])-new Date(qw[i]))/604800000)===1) s++; else break; }
    return s;
  })();

  return (
    <Card>
      <SL>📅 Weekly Consistency</SL>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
        <div style={{ textAlign:"center", background:C.surface, borderRadius:10, padding:10 }}>
          <div style={{ fontSize:24, fontWeight:900, color:C.gold }}>{qualWeeks}</div>
          <div style={{ fontSize:9, color:C.muted, fontWeight:700, letterSpacing:1 }}>3-DAY WEEKS</div>
        </div>
        <div style={{ textAlign:"center", background:C.surface, borderRadius:10, padding:10 }}>
          {paused ? (
            <><div style={{ fontSize:20, color:C.orange }}>⏸</div>
            <div style={{ fontSize:9, color:C.orange, fontWeight:700 }}>PAUSED</div></>
          ) : (
            <><div style={{ fontSize:24, fontWeight:900, color:C.cyan }}>{streak??0}</div>
            <div style={{ fontSize:9, color:C.muted, fontWeight:700, letterSpacing:1 }}>WEEK STREAK</div></>
          )}
        </div>
      </div>
      {paused && <div style={{ background:`${C.orange}15`, border:`1px solid ${C.orange}44`, borderRadius:8,
        padding:"8px 12px", marginBottom:10, fontSize:11, color:C.orange }}>⏸ {pauseNote}</div>}
      {showPause && !paused && (
        <div style={{ marginBottom:10 }}>
          <input value={noteInput} onChange={e=>setNoteInput(e.target.value)} placeholder="Reason (deload, injury…)"
            style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, color:C.text,
              padding:"9px 12px", fontSize:13, fontFamily:"inherit", outline:"none", width:"100%",
              boxSizing:"border-box", marginBottom:8 }}/>
          <div style={{ display:"flex", gap:8 }}>
            <Btn onClick={()=>{setPaused(true);setPauseNote(noteInput||"Rest period");setShowPause(false);setNoteInput("");}}
              variant="orange" style={{flex:1,fontSize:12,padding:"8px"}}>Confirm</Btn>
            <Btn onClick={()=>setShowPause(false)} variant="ghost" style={{padding:"8px 12px",fontSize:12}}>Cancel</Btn>
          </div>
        </div>
      )}
      {paused
        ? <Btn onClick={()=>{setPaused(false);setPauseNote("");}} variant="cyan" style={{width:"100%",fontSize:12,padding:"8px"}}>▶ Resume</Btn>
        : !showPause && <Btn onClick={()=>setShowPause(true)} variant="ghost" style={{width:"100%",fontSize:12,padding:"8px"}}>⏸ Pause for Deload / Rest</Btn>
      }
    </Card>
  );
};

// ─── LOG TAB — speed-optimized ────────────────────────────────────────────────
const LogTab = ({ exercises, setExercises, workouts, setWorkouts, prs, setPrs }) => {
  const today = new Date().toISOString().split("T")[0];
  const [date, setDate] = useState(today);

  // Sticky muscle group — persists across exercises until manually changed
  const [muscleGroup, setMuscleGroup] = useState("");
  const [exercise, setExercise] = useState("");

  // Flow steps: "select" | "st" | "sets" 
  const [step, setStep] = useState("select");

  // Strength test
  const [stSkipped, setStSkipped] = useState(false);
  const [stReps, setStReps] = useState("3");
  const [stWeight, setStWeight] = useState("");
  const [stLogged, setStLogged] = useState(false);
  const [stResult, setStResult] = useState(null);

  // Working sets
  const [sets, setSets] = useState([{ weight:"", reps:"" }]);
  const [currentSetIdx, setCurrentSetIdx] = useState(0);

  // Inline add exercise
  const [showAddEx, setShowAddEx] = useState(false);
  const [newExName, setNewExName] = useState("");

  // Session
  const [sessionExercises, setSessionExercises] = useState([]);
  const [notes, setNotes] = useState("");
  const [saved, setSaved] = useState(false);
  const [editingIdx, setEditingIdx] = useState(null);

  // Notes visibility
  const [showNotes, setShowNotes] = useState(false);

  // Refs for auto-focus
  const stWeightRef = useRef();
  const setWeightRef = useRef();
  const setRepsRef = useRef();

  const availExercises = muscleGroup ? (exercises[muscleGroup]||[]) : [];
  const currentPR = getPR(prs, exercise);
  const isDB = isDumbbell(exercise);
  const weightLabel = isDB ? "Weight (lbs each)" : "Weight (lbs)";
  const weightSublabel = isDB ? "per dumbbell" : null;

  // Auto-focus ST weight when step becomes "st"
  useEffect(() => {
    if (step==="st" && !stSkipped) {
      setTimeout(() => stWeightRef.current?.focus(), 80);
    }
  }, [step, stSkipped]);

  // Auto-focus set weight when step becomes "sets"
  useEffect(() => {
    if (step==="sets") {
      setTimeout(() => setWeightRef.current?.focus(), 80);
    }
  }, [step, currentSetIdx]);

  const handleExerciseSelect = (ex) => {
    setExercise(ex);
    setStWeight(""); setStReps("3"); setStLogged(false); setStResult(null); setStSkipped(false);
    setSets([{ weight:"", reps:"" }]); setCurrentSetIdx(0);
    setStep("st");
  };

  const quickAddExercise = () => {
    if (!newExName.trim() || !muscleGroup) return;
    const name = newExName.trim();
    setExercises({ ...exercises, [muscleGroup]: [...(exercises[muscleGroup]||[]), name] });
    setNewExName(""); setShowAddEx(false);
    handleExerciseSelect(name);
  };

  const logST = () => {
    if (!stWeight) return;
    const result = { reps:Number(stReps), weight:Number(stWeight) };
    setStResult(result); setStLogged(true);
    setPrs(setPR(prs, exercise, result.weight, date));
    setStep("sets");
  };

  const skipST = () => { setStSkipped(true); setStResult(null); setStep("sets"); };

  const updateSetField = (idx, field, val) => {
    const s = [...sets]; s[idx] = {...s[idx], [field]:val}; setSets(s);
  };

  const handleSetWeightKey = (e) => {
    if (e.key==="Enter" || e.key==="Tab") { e.preventDefault(); setRepsRef.current?.focus(); }
  };

  const handleSetRepsKey = (e) => {
    if (e.key==="Enter" || e.key==="Tab") { e.preventDefault(); confirmSet(); }
  };

  const confirmSet = () => {
    const s = sets[currentSetIdx];
    if (!s.weight || !s.reps) return;
    // auto-add next set row and focus its weight
    const next = currentSetIdx + 1;
    setSets([...sets, { weight:"", reps:"" }]);
    setCurrentSetIdx(next);
    setTimeout(() => setWeightRef.current?.focus(), 60);
  };

  const removeLastSet = () => {
    if (sets.length <= 1) return;
    const newSets = sets.slice(0, -1);
    setSets(newSets); setCurrentSetIdx(newSets.length - 1);
  };

  const addExerciseToSession = () => {
    const filledSets = sets.filter(s => s.weight && s.reps);
    if (!exercise || !filledSets.length) return;

    const entry = {
      muscleGroup, exercise,
      sets: filledSets.map(s => ({ weight:Number(s.weight), reps:Number(s.reps) })),
      strengthTest: stResult || null,
      isDB,
    };

    let newPrs = prs;
    const maxW = Math.max(...(stResult?[stResult.weight]:[]), ...entry.sets.map(s=>s.weight));
    newPrs = setPR(prs, exercise, maxW, date);
    setPrs(newPrs);

    if (editingIdx !== null) {
      const updated = [...sessionExercises]; updated[editingIdx] = entry;
      setSessionExercises(updated); setEditingIdx(null);
    } else {
      setSessionExercises([...sessionExercises, entry]);
    }

    // Reset exercise fields but KEEP muscle group sticky
    setExercise(""); setStep("select");
    setStWeight(""); setStReps("3"); setStLogged(false); setStResult(null); setStSkipped(false);
    setSets([{ weight:"", reps:"" }]); setCurrentSetIdx(0);
  };

  const editExercise = (idx) => {
    const ex = sessionExercises[idx];
    setMuscleGroup(ex.muscleGroup); setExercise(ex.exercise);
    setStResult(ex.strengthTest); setStLogged(!!ex.strengthTest); setStSkipped(!ex.strengthTest);
    setSets([...ex.sets.map(s=>({weight:String(s.weight),reps:String(s.reps)})), {weight:"",reps:""}]);
    setCurrentSetIdx(ex.sets.length);
    setEditingIdx(idx); setStep("sets");
    window.scrollTo({top:0, behavior:"smooth"});
  };

  const removeExercise = (idx) => setSessionExercises(sessionExercises.filter((_,i)=>i!==idx));

  const saveWorkout = () => {
    if (!sessionExercises.length) return;
    setWorkouts([...workouts, { id:Date.now(), date, exercises:sessionExercises, notes }]);
    setSessionExercises([]); setNotes(""); setSaved(true);
    setTimeout(() => setSaved(false), 2500);
    setExercise(""); setMuscleGroup(""); setStep("select");
  };

  const filledSets = sets.filter(s=>s.weight&&s.reps);
  const isNewPR = exercise && stWeight && currentPR && Number(stWeight) > currentPR.weight;

  return (
    <div style={{ maxWidth:600, margin:"0 auto" }}>

      {/* Date bar */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
        background:C.card, border:`1px solid ${C.border}`, borderRadius:14, padding:"10px 16px", marginBottom:14 }}>
        <span style={{ fontSize:13, color:C.muted, fontWeight:700 }}>📅 Session</span>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)}
          style={{ background:"transparent", border:"none", color:C.text, fontSize:14,
            fontFamily:"inherit", fontWeight:800, outline:"none", cursor:"pointer" }}/>
      </div>

      {/* ── EXERCISE BUILDER CARD ── */}
      <Card style={{ marginBottom:14 }}>

        {/* Muscle group — sticky */}
        <div style={{ marginBottom:12 }}>
          <SL>Muscle Group</SL>
          <Select value={muscleGroup} onChange={v=>{setMuscleGroup(v);setExercise("");setStep("select");setShowAddEx(false);}}>
            <option value="">— Select —</option>
            {MUSCLE_GROUPS.map(g=><option key={g} value={g}>{g}</option>)}
          </Select>
        </div>

        {/* Exercise select */}
        {muscleGroup && step==="select" && (
          <div style={{ marginBottom:12 }}>
            <SL>Exercise</SL>
            <Select value={exercise} onChange={handleExerciseSelect}>
              <option value="">— Select Exercise —</option>
              {availExercises.map(e=><option key={e} value={e}>{e}</option>)}
            </Select>
            {/* Quick-add */}
            {!showAddEx
              ? <button onClick={()=>setShowAddEx(true)} style={{ background:"none", border:"none",
                  color:C.cyan, fontSize:12, cursor:"pointer", fontFamily:"inherit", fontWeight:700,
                  padding:"6px 0 0", display:"block" }}>+ Add new exercise to {muscleGroup}</button>
              : <div style={{ display:"flex", gap:8, marginTop:8 }}>
                  <input value={newExName} onChange={e=>setNewExName(e.target.value)}
                    placeholder={`New ${muscleGroup} exercise…`}
                    onKeyDown={e=>e.key==="Enter"&&quickAddExercise()}
                    style={{ flex:1, background:C.surface, border:`1px solid ${C.cyan}44`, borderRadius:9,
                      color:C.text, padding:"9px 12px", fontSize:14, fontFamily:"inherit", outline:"none" }}
                    autoFocus/>
                  <Btn onClick={quickAddExercise} variant="cyan" style={{padding:"9px 14px"}}>Save</Btn>
                  <Btn onClick={()=>{setShowAddEx(false);setNewExName("");}} variant="ghost" style={{padding:"9px 12px"}}>✕</Btn>
                </div>
            }
          </div>
        )}

        {/* Exercise selected — show name + PR badge + change link */}
        {exercise && step !== "select" && (
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
            background:C.surface, borderRadius:10, padding:"10px 14px", marginBottom:14 }}>
            <div>
              <div style={{ fontWeight:900, fontSize:15, color:C.text }}>{exercise}</div>
              {currentPR && (
                <div style={{ fontSize:11, color:C.gold, marginTop:2 }}>
                  🏆 PR: {currentPR.weight} lbs{currentPR.date ? ` · ${currentPR.date}` : ""}
                </div>
              )}
              {isDB && <div style={{ fontSize:10, color:C.cyan, marginTop:1, fontWeight:700 }}>dumbbell — log per dumbbell</div>}
            </div>
            <button onClick={()=>{setExercise("");setStep("select");setStLogged(false);setStResult(null);setStSkipped(false);setSets([{weight:"",reps:""}]);}}
              style={{ background:"none", border:`1px solid ${C.border}`, color:C.muted, borderRadius:7,
                padding:"4px 10px", fontSize:11, cursor:"pointer", fontFamily:"inherit", fontWeight:700 }}>
              Change
            </button>
          </div>
        )}

        {/* ── STEP: STRENGTH TEST ── */}
        {step==="st" && (
          <div style={{ background:`${C.gold}0c`, border:`1px solid ${C.gold}33`,
            borderRadius:12, padding:14, marginBottom:14 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
              <span style={{ fontWeight:900, color:C.gold, fontSize:14 }}>🏋️ Strength Test</span>
              <Btn onClick={skipST} variant="ghost" style={{ fontSize:11, padding:"5px 12px", color:C.muted }}>
                Skip →
              </Btn>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
              <div>
                <div style={{ fontSize:10, color:C.gold, fontWeight:700, letterSpacing:1, marginBottom:5 }}>REPS</div>
                <Select value={stReps} onChange={setStReps}>
                  {[1,2,3,4,5,6,8,10].map(r=><option key={r} value={r}>{r} rep{r>1?"s":""}</option>)}
                </Select>
              </div>
              <div>
                <div style={{ fontSize:10, color:C.gold, fontWeight:700, letterSpacing:1, marginBottom:5 }}>
                  {weightLabel.toUpperCase()}
                </div>
                <input ref={stWeightRef} type="number" inputMode="decimal" value={stWeight}
                  onChange={e=>setStWeight(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&logST()}
                  placeholder="0"
                  style={{ background:C.surface, border:`1px solid ${C.gold}55`, borderRadius:10,
                    color:C.text, padding:"12px 14px", fontSize:16, fontFamily:"inherit",
                    outline:"none", width:"100%", boxSizing:"border-box", WebkitAppearance:"none" }}
                  onFocus={e=>{e.target.style.borderColor=C.gold;e.target.style.boxShadow=`0 0 0 2px ${C.gold}33`;}}
                  onBlur={e=>{e.target.style.borderColor=`${C.gold}55`;e.target.style.boxShadow="none";}}
                />
                {weightSublabel && <div style={{ fontSize:10, color:C.cyan, fontWeight:700, marginTop:4 }}>{weightSublabel}</div>}
              </div>
            </div>
            {isNewPR && (
              <div style={{ padding:"6px 10px", background:`${C.gold}20`, borderRadius:7,
                fontSize:12, color:C.gold, fontWeight:800, marginBottom:10 }}>
                🏆 New PR! (current: {currentPR.weight} lbs)
              </div>
            )}
            <Btn onClick={logST} variant="gold" style={{ width:"100%", fontSize:14 }} disabled={!stWeight}>
              ✓ Log Strength Test → Working Sets
            </Btn>
          </div>
        )}

        {/* ST logged confirmation (compact) */}
        {step==="sets" && stResult && (
          <div style={{ display:"flex", alignItems:"center", gap:10, background:`${C.gold}15`,
            border:`1px solid ${C.gold}33`, borderRadius:10, padding:"8px 14px", marginBottom:12 }}>
            <span style={{ fontSize:18 }}>✅</span>
            <div style={{ flex:1 }}>
              <span style={{ fontWeight:900, color:C.gold, fontSize:14 }}>{stResult.weight} lbs</span>
              <span style={{ color:C.muted, fontSize:12 }}> @ {stResult.reps} rep{stResult.reps>1?"s":""} — ST logged</span>
            </div>
            <button onClick={()=>setStep("st")} style={{ background:"none", border:`1px solid ${C.border}`,
              color:C.muted, borderRadius:7, padding:"3px 8px", fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>Edit</button>
          </div>
        )}
        {step==="sets" && stSkipped && (
          <div style={{ fontSize:11, color:C.muted, marginBottom:12, padding:"6px 12px",
            background:C.surface, borderRadius:8, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span>Strength test skipped</span>
            <button onClick={()=>setStep("st")} style={{ background:"none", border:"none",
              color:C.cyan, fontSize:11, cursor:"pointer", fontFamily:"inherit", fontWeight:700 }}>Add ST</button>
          </div>
        )}

        {/* ── STEP: WORKING SETS ── */}
        {step==="sets" && (
          <div>
            <Divider label="WORKING SETS"/>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:6,
              fontSize:10, color:C.muted, fontWeight:700, letterSpacing:1, padding:"0 2px" }}>
              <span>{weightLabel.toUpperCase()}</span>
              <span>REPS</span>
            </div>

            {/* Previous sets (filled) */}
            {sets.slice(0, currentSetIdx).filter(s=>s.weight&&s.reps).map((s,i)=>(
              <div key={i} style={{ display:"grid", gridTemplateColumns:"1fr 1fr auto", gap:8, marginBottom:6, alignItems:"center" }}>
                <div style={{ background:C.surface, borderRadius:9, padding:"10px 14px", fontSize:14, color:C.muted, textAlign:"center" }}>{s.weight}</div>
                <div style={{ background:C.surface, borderRadius:9, padding:"10px 14px", fontSize:14, color:C.muted, textAlign:"center" }}>{s.reps}</div>
                <button onClick={()=>{ const ns=[...sets]; ns.splice(i,1); setSets(ns); setCurrentSetIdx(v=>Math.max(0,v-1)); }}
                  style={{ background:"#ff305522", color:"#ff3055", border:"none", borderRadius:8,
                    width:36, height:36, cursor:"pointer", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
              </div>
            ))}

            {/* Active set row */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
              <div>
                <input ref={setWeightRef} type="number" inputMode="decimal"
                  value={sets[currentSetIdx]?.weight||""}
                  onChange={e=>updateSetField(currentSetIdx,"weight",e.target.value)}
                  onKeyDown={handleSetWeightKey}
                  placeholder="0"
                  style={{ background:C.surface, border:`2px solid ${C.accent}`, borderRadius:10,
                    color:C.text, padding:"13px 14px", fontSize:17, fontFamily:"inherit",
                    outline:"none", width:"100%", boxSizing:"border-box", WebkitAppearance:"none",
                    boxShadow:`0 0 0 3px ${C.accentGlow}` }}
                />
                {weightSublabel && <div style={{ fontSize:10, color:C.cyan, fontWeight:700, marginTop:3 }}>{weightSublabel}</div>}
              </div>
              <input ref={setRepsRef} type="number" inputMode="decimal"
                value={sets[currentSetIdx]?.reps||""}
                onChange={e=>updateSetField(currentSetIdx,"reps",e.target.value)}
                onKeyDown={handleSetRepsKey}
                placeholder="0"
                style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:10,
                  color:C.text, padding:"13px 14px", fontSize:17, fontFamily:"inherit",
                  outline:"none", width:"100%", boxSizing:"border-box", WebkitAppearance:"none" }}
                onFocus={e=>{e.target.style.borderColor=C.accent;}}
                onBlur={e=>{e.target.style.borderColor=C.border;}}
              />
            </div>
            <div style={{ fontSize:10, color:C.muted, textAlign:"center", marginBottom:10 }}>
              Set {currentSetIdx+1} · Enter weight → Tab/Enter → reps → Enter to add set
            </div>

            <div style={{ display:"flex", gap:8, marginBottom:10 }}>
              <Btn onClick={confirmSet} variant="subtle" style={{ flex:1, fontSize:12, padding:"9px" }}
                disabled={!sets[currentSetIdx]?.weight||!sets[currentSetIdx]?.reps}>
                + Add Another Set
              </Btn>
              {currentSetIdx > 0 && (
                <Btn onClick={removeLastSet} variant="ghost" style={{ fontSize:12, padding:"9px 14px", color:"#ff3055" }}>
                  Undo
                </Btn>
              )}
            </div>

            <Btn onClick={addExerciseToSession} variant={editingIdx!==null?"gold":"primary"}
              style={{ width:"100%", fontSize:15, padding:"13px" }}
              disabled={!filledSets.length}>
              {editingIdx!==null ? "✓ Update Exercise" : `✓ Log Exercise (${filledSets.length} set${filledSets.length!==1?"s":""})`}
            </Btn>
          </div>
        )}
      </Card>

      {/* ── SESSION LOG (scrollable, unlimited exercises) ── */}
      {sessionExercises.length > 0 && (
        <Card style={{ marginBottom:14 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div style={{ fontSize:15, fontWeight:900 }}>
              🔥 Session <span style={{ color:C.accent }}>{sessionExercises.length}</span> exercise{sessionExercises.length!==1?"s":""}
            </div>
            <button onClick={()=>setShowNotes(!showNotes)}
              style={{ background:"none", border:`1px solid ${C.border}`, color:C.muted,
                borderRadius:7, padding:"4px 10px", fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>
              {showNotes?"Hide Notes":"📝 Notes"}
            </button>
          </div>

          {/* Group exercises by muscle group */}
          {(() => {
            const groups = {};
            sessionExercises.forEach((ex,i) => {
              if (!groups[ex.muscleGroup]) groups[ex.muscleGroup] = [];
              groups[ex.muscleGroup].push({ex,i});
            });
            return Object.entries(groups).map(([mg, items]) => (
              <div key={mg} style={{ marginBottom:14 }}>
                <div style={{ fontSize:10, color:C.purple, fontWeight:800, letterSpacing:2,
                  textTransform:"uppercase", marginBottom:8, paddingBottom:4,
                  borderBottom:`1px solid ${C.purple}33` }}>
                  {mg}
                </div>
                {items.map(({ex,i}) => {
                  const pr = getPR(prs, ex.exercise);
                  const topW = Math.max(...(ex.strengthTest?[ex.strengthTest.weight]:[0]), ...ex.sets.map(s=>s.weight));
                  return (
                    <div key={i} style={{ background:C.surface, borderRadius:10, padding:"10px 12px",
                      marginBottom:8, border:`1px solid ${editingIdx===i?C.accent:C.border}` }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                          <span style={{ fontWeight:800, fontSize:13, color:C.text }}>{ex.exercise}</span>
                          {pr && topW >= pr.weight && <Tag color={C.gold}>🏆 PR</Tag>}
                          {ex.isDB && <Tag color={C.cyan}>DB</Tag>}
                        </div>
                        <div style={{ display:"flex", gap:6 }}>
                          <button onClick={()=>editExercise(i)}
                            style={{ background:"none", border:`1px solid ${C.border}`, color:C.cyan,
                              borderRadius:6, padding:"3px 8px", fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>
                            Edit
                          </button>
                          <button onClick={()=>removeExercise(i)}
                            style={{ background:"none", border:"none", color:"#ff3055",
                              cursor:"pointer", fontSize:15, padding:"2px 4px" }}>🗑</button>
                        </div>
                      </div>
                      {ex.strengthTest && (
                        <div style={{ display:"inline-flex", gap:6, background:`${C.gold}15`,
                          border:`1px solid ${C.gold}33`, borderRadius:7, padding:"4px 10px",
                          fontSize:11, marginBottom:6 }}>
                          <span style={{ color:C.gold, fontWeight:800 }}>🏋️ {ex.strengthTest.reps}-RM:</span>
                          <span style={{ color:C.text, fontWeight:700 }}>{ex.strengthTest.weight} lbs{ex.isDB?" (ea)":""}</span>
                        </div>
                      )}
                      <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                        {ex.sets.map((s,si)=>(
                          <div key={si} style={{ background:C.card, borderRadius:6, padding:"4px 9px",
                            fontSize:11, color:C.muted }}>
                            S{si+1}: <span style={{ color:C.text, fontWeight:700 }}>{s.weight}{ex.isDB?" (ea)":""} × {s.reps}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            ));
          })()}

          {showNotes && (
            <textarea value={notes} onChange={e=>setNotes(e.target.value)}
              placeholder="Session notes — energy, form cues, how the ST felt…"
              style={{ width:"100%", background:C.surface, border:`1px solid ${C.border}`,
                borderRadius:10, color:C.text, padding:"11px 13px", fontSize:13,
                fontFamily:"inherit", resize:"vertical", minHeight:70,
                boxSizing:"border-box", outline:"none", marginTop:4 }}/>
          )}

          <Btn onClick={saveWorkout} variant="gold" style={{ width:"100%", marginTop:12, fontSize:15, padding:"13px" }}>
            {saved ? "✅ Workout Saved!" : "💾 Save Workout"}
          </Btn>
        </Card>
      )}
    </div>
  );
};

// ─── HISTORY TAB ──────────────────────────────────────────────────────────────
const HistoryTab = ({ workouts, setWorkouts }) => {
  const [selected, setSelected] = useState(null);
  const [heatTip, setHeatTip] = useState(null);

  const deleteWorkout = (id) => { setWorkouts(workouts.filter(w=>w.id!==id)); if(selected?.id===id) setSelected(null); };
  const sorted = [...workouts].sort((a,b)=>new Date(b.date)-new Date(a.date));

  const getWeekKey = d => {
    const dt=new Date(d+"T12:00:00"),day=dt.getDay()||7;
    const m=new Date(dt); m.setDate(dt.getDate()-day+1); return m.toISOString().split("T")[0];
  };
  const weekMap={};
  workouts.forEach(w=>{ const k=getWeekKey(w.date); if(!weekMap[k]) weekMap[k]=new Set(); weekMap[k].add(w.date); });
  const qualWeeks=Object.values(weekMap).filter(d=>d.size>=3).length;

  const heatmap = (() => {
    const map={}; workouts.forEach(w=>{map[w.date]=(map[w.date]||0)+1;});
    const weeks=[]; const end=new Date(); const start=new Date(end); start.setDate(start.getDate()-7*16);
    let cur=new Date(start);
    while(cur<=end){ const week=[]; for(let d=0;d<7;d++){const k=cur.toISOString().split("T")[0]; week.push({date:k,count:map[k]||0}); cur.setDate(cur.getDate()+1);} weeks.push(week); }
    return weeks;
  })();

  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:16 }}>
        {[
          {label:"Total Workouts",value:workouts.length,color:C.accent},
          {label:"3-Day Weeks",value:qualWeeks,color:C.gold},
          {label:"This Month",value:workouts.filter(w=>w.date.startsWith(new Date().toISOString().slice(0,7))).length,color:C.cyan},
        ].map(s=>(
          <Card key={s.label} style={{textAlign:"center",padding:12}}>
            <div style={{fontSize:28,fontWeight:900,color:s.color}}>{s.value}</div>
            <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>{s.label}</div>
          </Card>
        ))}
      </div>

      <Card style={{marginBottom:16}}>
        <SL>🗓 Activity — Last 16 Weeks</SL>
        <div style={{display:"flex",gap:3,overflowX:"auto"}}>
          <div style={{display:"flex",flexDirection:"column",gap:3,paddingTop:2,marginRight:3}}>
            {["M","T","W","T","F","S","S"].map((l,i)=>(
              <div key={i} style={{height:14,fontSize:9,color:C.muted,display:"flex",alignItems:"center",fontWeight:700,width:10}}>{l}</div>
            ))}
          </div>
          {heatmap.map((week,wi)=>(
            <div key={wi} style={{display:"flex",flexDirection:"column",gap:3}}>
              {week.map(day=>(
                <div key={day.date}
                  onMouseEnter={e=>{setHeatTip(day);e.currentTarget.style.transform="scale(1.5)";}}
                  onMouseLeave={e=>{setHeatTip(null);e.currentTarget.style.transform="scale(1)";}}
                  style={{width:14,height:14,borderRadius:3,cursor:"default",transition:"transform .1s",
                    background:day.count===0?C.surface:day.count===1?"#ff4d6d55":C.accent,
                    border:`1px solid ${day.count>0?C.accent+"66":C.border}`}}/>
              ))}
            </div>
          ))}
        </div>
        <div style={{marginTop:8,minHeight:16,fontSize:11,color:C.muted}}>
          {heatTip ? <span><span style={{color:C.text,fontWeight:700}}>{heatTip.date}</span> — {heatTip.count===0?"Rest day 😴":`${heatTip.count} workout${heatTip.count>1?"s":""} 💪`}</span>
            : <span style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                {[{bg:C.surface,label:"Rest"},{bg:"#ff4d6d55",label:"1 session"},{bg:C.accent,label:"2+ sessions"}].map(x=>(
                  <span key={x.label} style={{display:"inline-flex",alignItems:"center",gap:4}}>
                    <span style={{width:10,height:10,borderRadius:2,background:x.bg,display:"inline-block",border:`1px solid ${C.border}`}}/>
                    {x.label}
                  </span>
                ))}
              </span>
          }
        </div>
      </Card>

      <div style={{display:"grid",gridTemplateColumns:selected?"1fr 1fr":"1fr",gap:14}}>
        <Card>
          <div style={{fontSize:15,fontWeight:900,marginBottom:12}}>📋 Workout Log</div>
          {sorted.length===0
            ? <div style={{color:C.muted,textAlign:"center",padding:30}}>No workouts yet. Let's go! 💪</div>
            : sorted.map(w=>{
              const groups=[...new Set(w.exercises.map(e=>e.muscleGroup))];
              const hasST=w.exercises.some(e=>e.strengthTest);
              return (
                <div key={w.id} onClick={()=>setSelected(w===selected?null:w)}
                  style={{padding:12,borderRadius:11,marginBottom:8,cursor:"pointer",
                    border:`1px solid ${selected?.id===w.id?C.accent:C.border}`,
                    background:selected?.id===w.id?`${C.accent}11`:C.surface,transition:"all .2s"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontWeight:800,color:C.text,marginBottom:5,fontSize:13}}>{w.date}</div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                        {groups.map(g=><Tag key={g} color={C.purple}>{g}</Tag>)}
                        {hasST&&<Tag color={C.gold}>🏋️ ST</Tag>}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <span style={{fontSize:11,color:C.muted}}>{w.exercises.length} ex</span>
                      <button onClick={e=>{e.stopPropagation();deleteWorkout(w.id);}}
                        style={{background:"none",border:"none",color:"#ff3055",cursor:"pointer",fontSize:15}}>🗑</button>
                    </div>
                  </div>
                </div>
              );
            })
          }
        </Card>
        {selected && (
          <Card>
            <div style={{fontSize:15,fontWeight:900,marginBottom:12}}>📝 {selected.date}</div>
            {(() => {
              const groups={};
              selected.exercises.forEach((ex,i)=>{if(!groups[ex.muscleGroup]) groups[ex.muscleGroup]=[]; groups[ex.muscleGroup].push({ex,i});});
              return Object.entries(groups).map(([mg,items])=>(
                <div key={mg} style={{marginBottom:12}}>
                  <div style={{fontSize:10,color:C.purple,fontWeight:800,letterSpacing:2,textTransform:"uppercase",
                    marginBottom:6,paddingBottom:3,borderBottom:`1px solid ${C.purple}33`}}>{mg}</div>
                  {items.map(({ex,i})=>(
                    <div key={i} style={{marginBottom:10}}>
                      <div style={{fontWeight:800,fontSize:13,color:C.text,marginBottom:5}}>{ex.exercise}</div>
                      {ex.strengthTest&&(
                        <div style={{display:"inline-flex",gap:6,background:`${C.gold}15`,border:`1px solid ${C.gold}33`,
                          borderRadius:7,padding:"4px 10px",fontSize:11,marginBottom:5}}>
                          <span style={{color:C.gold,fontWeight:800}}>🏋️ {ex.strengthTest.reps}-RM:</span>
                          <span style={{color:C.text,fontWeight:700}}>{ex.strengthTest.weight} lbs{ex.isDB?" (ea)":""}</span>
                        </div>
                      )}
                      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                        {ex.sets.map((s,si)=>(
                          <div key={si} style={{background:C.surface,borderRadius:6,padding:"4px 9px",fontSize:11,color:C.muted}}>
                            S{si+1}: <span style={{color:C.text,fontWeight:700}}>{s.weight}{ex.isDB?" (ea)":""} × {s.reps}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              ));
            })()}
            {selected.notes&&(
              <div style={{background:C.surface,borderRadius:9,padding:10,fontSize:12,color:C.muted,fontStyle:"italic",marginTop:4}}>
                📝 {selected.notes}
              </div>
            )}
          </Card>
        )}
      </div>
    </div>
  );
};

// ─── TOOLS TAB (Timer + Consistency + PRs) ────────────────────────────────────
const ToolsTab = ({ workouts, prs }) => {
  return (
    <div style={{maxWidth:600,margin:"0 auto",display:"flex",flexDirection:"column",gap:16}}>
      <RestTimer/>
      <ConsistencyTracker workouts={workouts}/>
      <Card>
        <SL>🏆 Personal Records</SL>
        {Object.keys(prs).length===0
          ? <div style={{color:C.muted,fontSize:13}}>No PRs yet. Start lifting!</div>
          : (() => {
              const groups={};
              Object.entries(prs).forEach(([ex,pr])=>{
                const mg = Object.entries(DEFAULT_EXERCISES).find(([,exs])=>exs.includes(ex))?.[0] || "Other";
                if(!groups[mg]) groups[mg]=[];
                groups[mg].push({ex,pr});
              });
              return Object.entries(groups).map(([mg,items])=>(
                <div key={mg} style={{marginBottom:14}}>
                  <div style={{fontSize:10,color:C.purple,fontWeight:800,letterSpacing:2,
                    textTransform:"uppercase",marginBottom:6,paddingBottom:3,borderBottom:`1px solid ${C.purple}33`}}>{mg}</div>
                  {items.map(({ex,pr})=>{
                    const w=typeof pr==="object"?pr.weight:pr;
                    const d=typeof pr==="object"?pr.date:null;
                    return (
                      <div key={ex} style={{display:"flex",justifyContent:"space-between",
                        alignItems:"flex-start",padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
                        <div>
                          <div style={{color:C.muted,fontSize:12}}>{ex}</div>
                          {d&&<div style={{fontSize:10,color:C.muted,marginTop:1}}>📅 {d}</div>}
                        </div>
                        <span style={{color:C.gold,fontWeight:900,fontSize:14}}>{w} lbs</span>
                      </div>
                    );
                  })}
                </div>
              ));
            })()
        }
      </Card>
    </div>
  );
};

// ─── PROGRAMS TAB ─────────────────────────────────────────────────────────────

// ─── BODY WEIGHT ──────────────────────────────────────────────────────────────
const BodyWeightTab = () => {
  const [entries,setEntries]=useStorage("gym_bodyweight",[]);
  const [weight,setWeight]=useState("");
  const [date,setDate]=useState(new Date().toISOString().split("T")[0]);
  const [unit,setUnit]=useState("lbs");
  const add=()=>{ if(!weight) return; setEntries([...entries,{date,weight:Number(weight),unit}].sort((a,b)=>a.date.localeCompare(b.date))); setWeight(""); };
  const sorted=[...entries].sort((a,b)=>a.date.localeCompare(b.date));
  const latest=sorted[sorted.length-1]; const first=sorted[0];
  const change=latest&&first&&latest!==first?(latest.weight-first.weight).toFixed(1):null;
  const sparkline=(()=>{
    if(sorted.length<2) return null;
    const W=400,H=90; const weights=sorted.map(e=>e.weight);
    const mn=Math.min(...weights)-2,mx=Math.max(...weights)+2;
    const pts=sorted.map((e,i)=>({x:(i/(sorted.length-1))*W,y:H-((e.weight-mn)/(mx-mn))*H}));
    const d=pts.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ");
    return {d,pts,W,H};
  })();
  return (
    <div style={{maxWidth:500,margin:"0 auto"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
        {[{label:"Current",value:latest?`${latest.weight} ${latest.unit}`:"—",color:C.accent},
          {label:"Started",value:first?`${first.weight} ${first.unit}`:"—",color:C.muted},
          {label:"Change",value:change!==null?`${Number(change)>0?"+":""}${change}`:"—",color:Number(change)<0?C.cyan:C.gold}
        ].map(s=>(
          <Card key={s.label} style={{textAlign:"center",padding:12}}>
            <div style={{fontSize:22,fontWeight:900,color:s.color}}>{s.value}</div>
            <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:1}}>{s.label}</div>
          </Card>
        ))}
      </div>
      {sparkline&&(
        <Card style={{marginBottom:16}}>
          <SL>Weight Trend</SL>
          <svg width="100%" viewBox={`0 0 ${sparkline.W} ${sparkline.H}`} style={{overflow:"visible"}}>
            <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={C.accent} stopOpacity=".3"/><stop offset="100%" stopColor={C.accent} stopOpacity="0"/>
            </linearGradient></defs>
            <path d={`${sparkline.d} L ${sparkline.W} ${sparkline.H} L 0 ${sparkline.H} Z`} fill="url(#wg)"/>
            <path d={sparkline.d} fill="none" stroke={C.accent} strokeWidth="2.5" strokeLinejoin="round"/>
            {sparkline.pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="4" fill={C.accent}/>)}
          </svg>
        </Card>
      )}
      <Card>
        <SL>⚖️ Log Weight</SL>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto auto",gap:8,alignItems:"end"}}>
          <div><div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:5}}>DATE</div>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)}
              style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,
                padding:"10px 12px",fontSize:14,fontFamily:"inherit",outline:"none",width:"100%",boxSizing:"border-box"}}/></div>
          <div><div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:5}}>WEIGHT</div>
            <input type="number" inputMode="decimal" value={weight} onChange={e=>setWeight(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&add()} placeholder="0.0"
              style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,
                padding:"10px 12px",fontSize:14,fontFamily:"inherit",outline:"none",width:"100%",boxSizing:"border-box"}}/></div>
          <select value={unit} onChange={e=>setUnit(e.target.value)}
            style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,
              padding:"10px 8px",fontSize:13,fontFamily:"inherit",outline:"none"}}>
            <option>lbs</option><option>kg</option>
          </select>
          <Btn onClick={add} variant="cyan" style={{padding:"10px 14px"}}>Log</Btn>
        </div>
        <div style={{marginTop:16}}>
          {[...sorted].reverse().slice(0,12).map((e,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",
              borderBottom:`1px solid ${C.border}`,fontSize:13}}>
              <span style={{color:C.muted}}>{e.date}</span>
              <span style={{color:C.text,fontWeight:700}}>{e.weight} {e.unit}</span>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
};

// ─── AI COACH TAB ─────────────────────────────────────────────────────────────
const AICoachTab = ({ workouts, prs, bodyweight }) => {
  const [messages,setMessages]=useState([{role:"assistant",content:"Hey! Yeah, it's Claude — same one you're used to, just living inside your gym tracker now. 😄\n\nI've got your full training history loaded up — every workout, every strength test, every set, your PRs with dates, and your body weight log. I know you're running a Mentzer-style HIT approach and I'm not here to debate that — 15 years of results speak for themselves.\n\nAsk me anything. Training theory, your specific numbers, whether a certain body part looks like it might want more volume, how your strength tests are trending — whatever's on your mind. What are we looking at?"}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef();
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);

  const buildSystemPrompt=()=>{
    const stByEx={};
    workouts.forEach(w=>w.exercises.forEach(e=>{if(e.strengthTest){if(!stByEx[e.exercise])stByEx[e.exercise]=[];stByEx[e.exercise].push({date:w.date,reps:e.strengthTest.reps,weight:e.strengthTest.weight});}}));
    const workByEx={};
    workouts.forEach(w=>w.exercises.forEach(e=>{if(!workByEx[e.exercise])workByEx[e.exercise]=[];const top=e.sets.reduce((b,s)=>s.weight>b.weight?s:b,{weight:0,reps:0});workByEx[e.exercise].push({date:w.date,sets:e.sets.length,topSet:top,totalVol:e.sets.reduce((s,x)=>s+x.weight*x.reps,0)});}));
    const mgFreq={};workouts.forEach(w=>[...new Set(w.exercises.map(e=>e.muscleGroup))].forEach(g=>{mgFreq[g]=(mgFreq[g]||0)+1;}));
    const eightWkAgo=new Date();eightWkAgo.setDate(eightWkAgo.getDate()-56);
    const wkVol={};workouts.filter(w=>new Date(w.date)>=eightWkAgo).forEach(w=>w.exercises.forEach(e=>{const v=e.sets.reduce((s,x)=>s+x.weight*x.reps,0);wkVol[e.muscleGroup]=(wkVol[e.muscleGroup]||0)+v;}));
    const notes=workouts.filter(w=>w.notes?.trim()).slice(-20).map(w=>({date:w.date,note:w.notes}));
    const prSum=Object.entries(prs).map(([ex,pr])=>({exercise:ex,weight:typeof pr==="object"?pr.weight:pr,date:typeof pr==="object"?pr.date:null}));
    const bwS=[...bodyweight].sort((a,b)=>a.date.localeCompare(b.date));
    const bwTrend=bwS.length>=2?{first:bwS[0],latest:bwS[bwS.length-1],change:(bwS[bwS.length-1].weight-bwS[0].weight).toFixed(1),recent:bwS.slice(-6)}:null;
    return `You are an expert personal trainer and strength coach — and the AI coach inside a gym app called IRONLOG. You're powered by Claude (Anthropic). You have the athlete's complete training data below.

Talk casually. You're a knowledgeable training partner, not a corporate wellness bot. Be direct, real, specific. Reference actual numbers and dates.

ATHLETE: 15 years training experience. Runs Mike Mentzer-style HIT — warm-up sets, 3-rep max strength test, ONE all-out working set to failure. This is intentional and effective for them. DO NOT suggest they need more sets as a rule. DO NOT treat HIT as a fringe approach. They're open to adding volume selectively to lagging body parts — frame this as an option when data supports it, never as a correction.

TOTAL WORKOUTS: ${workouts.length} | RANGE: ${workouts.length?workouts[0]?.date+" → "+workouts[workouts.length-1]?.date:"none"}
PRs: ${JSON.stringify(prSum)}
ST HISTORY: ${JSON.stringify(stByEx)}
WORKING SETS: ${JSON.stringify(workByEx)}
MG FREQUENCY: ${JSON.stringify(mgFreq)}
8-WEEK VOLUME: ${JSON.stringify(wkVol)}
BODY WEIGHT: ${bwTrend?JSON.stringify(bwTrend):"none"}
SESSION NOTES: ${JSON.stringify(notes)}
FULL LOG: ${JSON.stringify(workouts.map(w=>({date:w.date,exercises:w.exercises.map(e=>({muscle:e.muscleGroup,name:e.exercise,st:e.strengthTest||null,sets:e.sets})),notes:w.notes||null})))}`;
  };

  const send=async()=>{
    if(!input.trim()||loading) return;
    const userMsg={role:"user",content:input};
    const newMsgs=[...messages,userMsg];
    setMessages(newMsgs);setInput("");setLoading(true);
    try {
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,system:buildSystemPrompt(),
          messages:newMsgs.map(m=>({role:m.role,content:m.content}))})});
      const data=await res.json();
      const reply=data.content?.find(b=>b.type==="text")?.text||"Sorry, couldn't process that.";
      setMessages([...newMsgs,{role:"assistant",content:reply}]);
    } catch { setMessages([...newMsgs,{role:"assistant",content:"Connection error. Please try again."}]); }
    setLoading(false);
  };

  const prompts=["How are my strength tests trending?","Any body parts lagging?","Am I plateauing on anything?","Should any muscle get more volume?","Am I recovering well?"];

  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 160px)"}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
        {prompts.map(q=>(
          <button key={q} onClick={()=>setInput(q)}
            style={{background:C.surface,border:`1px solid ${C.border}`,color:C.muted,
              borderRadius:20,padding:"5px 12px",fontSize:11,cursor:"pointer",fontFamily:"inherit",
              WebkitTapHighlightColor:"transparent"}}>
            {q}
          </button>
        ))}
      </div>
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:12,paddingRight:2,marginBottom:12}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"80%",padding:"11px 15px",
              borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",
              background:m.role==="user"?C.accent:C.card,
              border:m.role==="assistant"?`1px solid ${C.border}`:"none",
              color:C.text,fontSize:13,lineHeight:1.65,whiteSpace:"pre-wrap",
              boxShadow:m.role==="user"?`0 0 18px ${C.accentGlow}`:"none"}}>
              {m.content}
            </div>
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex"}}>
            <div style={{padding:"11px 15px",borderRadius:"18px 18px 18px 4px",background:C.card,
              border:`1px solid ${C.border}`,color:C.muted,fontSize:13}}>
              <span style={{animation:"pulse 1s infinite"}}>Analyzing your data…</span>
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}
          placeholder="Ask your AI coach anything…"
          style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:12,
            color:C.text,padding:"12px 15px",fontSize:13,fontFamily:"inherit",outline:"none"}}/>
        <Btn onClick={send} variant="primary" disabled={loading||!input.trim()}>Send ↑</Btn>
      </div>
    </div>
  );
};

        borderTop:`1px solid ${C.border}`,
        paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        <div style={{maxWidth:700,margin:"0 auto",display:"flex"}}>
          {TABS.map((t,i)=>(
            <button key={t} onClick={()=>setTab(i)}
              style={{flex:1,background:"none",border:"none",padding:"10px 4px 8px",cursor:"pointer",
                display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                WebkitTapHighlightColor:"transparent"}}>
              <span style={{fontSize:20}}>{tabIcons[i]}</span>
              <span style={{fontSize:9,fontWeight:700,letterSpacing:.5,color:tab===i?C.accent:C.muted,
                fontFamily:"'Barlow',sans-serif",textTransform:"uppercase"}}>
                {t}
              </span>
              {tab===i&&<div style={{width:4,height:4,borderRadius:2,background:C.accent,marginTop:1}}/>}
            </button>
          ))}
        </div>
      </div>

      {showLibrary&&<ExerciseLibrary exercises={exercises} setExercises={setExercises} onClose={()=>setShowLibrary(false)}/>}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GymTracker/>);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(e => console.log('SW:', e));
      });
    }
  </script>
</body>
</html>
